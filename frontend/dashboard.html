<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forensic Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050816;
    color:white;
}

/* CONTAINER */

.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:#081024;

    border-right:2px solid #14f1d9;

    padding:30px 20px;

    display:flex;

    flex-direction:column;

    justify-content:space-between;
}

.logo{

    color:#14f1d9;

    font-size:42px;

    font-weight:bold;

    margin-bottom:50px;
}

.menu{

    display:flex;

    flex-direction:column;

    gap:20px;
}

.menu button{

    background:none;

    border:none;

    color:white;

    text-align:left;

    font-size:20px;

    padding:15px;

    border-radius:12px;

    cursor:pointer;

    transition:0.3s;
}

.menu button:hover{

    background:#132347;
}

.logout{

    background:#ff4d6d;

    border:none;

    padding:15px;

    color:white;

    font-size:18px;

    border-radius:12px;

    cursor:pointer;
}

/* MAIN */

.main{

    flex:1;

    padding:40px;
}

.title{

    font-size:52px;

    color:#14f1d9;

    margin-bottom:35px;
}

/* CARDS */

.cards{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:25px;

    margin-bottom:40px;
}

.card{

    background:#101937;

    padding:30px;

    border-radius:20px;

    border:1px solid #14f1d94f;
}

.card h3{

    color:#cfd6e4;

    margin-bottom:20px;

    font-size:24px;
}

.card p{

    font-size:48px;

    color:#14f1d9;

    font-weight:bold;
}

/* FORMS */

.form-section{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:30px;

    margin-bottom:40px;
}

.form-box{

    background:#101937;

    padding:30px;

    border-radius:20px;

    border:1px solid #14f1d94f;
}

.form-box h2{

    color:#14f1d9;

    margin-bottom:25px;
}

.form-box input,
.form-box textarea{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:none;

    border-radius:10px;

    background:#1a264d;

    color:white;

    font-size:16px;
}

.form-box textarea{

    height:120px;

    resize:none;
}

.form-box button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#14f1d9;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.form-box button:hover{

    opacity:0.9;
}

.verify-result{

    margin-top:15px;

    font-size:18px;

    font-weight:bold;
}

/* RECENT LOGS */

.logs{

    background:#101937;

    padding:30px;

    border-radius:20px;

    border:1px solid #14f1d94f;
}

.logs h2{

    color:#14f1d9;

    margin-bottom:25px;
}

table{

    width:100%;

    border-collapse:collapse;
}

th{

    background:#113447;

    padding:15px;

    color:#14f1d9;
}

td{

    padding:15px;

    border-bottom:1px solid #2d3963;
}

.success{

    color:#00ff88;

    font-weight:bold;
}

.hash{

    color:#14f1d9;
}

</style>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div>

            <div class="logo">

                FATS

            </div>

            <div class="menu">

                <button onclick="location.href='dashboard.html'">

                    Dashboard

                </button>

                <button onclick="location.href='blockchain.html'">

                    Blockchain

                </button>

                <button onclick="location.href='intrusion.html'">

                    Intrusion Logs

                </button>

                <button onclick="location.href='warrant.html'">

                    Warrant Access

                </button>

                <button
type="button"
onclick="window.location.href='instruction.html'">

Instruction

</button>

            </div>

        </div>

        <button class="logout"
        onclick="logout()">

            Logout

        </button>

    </div>

    <!-- MAIN -->

    <div class="main">

        <h1 class="title">

            Forensic Anti-Tamper Dashboard

        </h1>

        <!-- STATS -->

        <div class="cards">

            <div class="card">

                <h3>Total Cases</h3>

                <p id="totalCases">0</p>

            </div>

            <div class="card">

                <h3>Evidence Records</h3>

                <p id="totalEvidence">0</p>

            </div>

            <div class="card">

                <h3>Intrusion Attempts</h3>

                <p id="intrusionCount"
                style="color:#ff4d6d;">

                0

                </p>

            </div>

        </div>

        <!-- FORMS -->

        <div class="form-section">

            <!-- ADD EVIDENCE -->

            <div class="form-box">

                <h2>Add Evidence</h2>

                <input type="text"
                id="caseId"
                placeholder="Enter Case ID">

                <input type="text"
                id="evidenceData"
                placeholder="Enter Evidence Data">

                <textarea
                id="description"
                placeholder="Enter Evidence Description"></textarea>

                <input type="text"
                id="officerName"
                readonly>

                <input type="text"
                id="warrantId"
                placeholder="Enter Warrant ID">

                <button onclick="addEvidence()">

                    Add Evidence

                </button>

            </div>

            <!-- VERIFY -->

            <div class="form-box">

                <h2>Verify Access</h2>

                <input type="text"
                id="verifyCase"
                placeholder="Enter Case ID">

                <input type="text"
                id="verifyWarrant"
                placeholder="Enter Warrant ID">

                <button onclick="verifyAccess()">

                    Verify Warrant

                </button>

                <div id="verifyMessage"
                class="verify-result"></div>

            </div>

        </div>

        <!-- RECENT LOGS -->

     <div class="logs-section">

    <h2>Recent Evidence Logs</h2>

    <table class="logs-table">

        <thead>

            <tr>

                <th>Case ID</th>

                <th>Evidence</th>

                <th>Status</th>

                <th>Hash</th>

            </tr>

        </thead>

        <tbody id="logsTable">

        </tbody>

    </table>

</div>

<!-- SCRIPT -->

<script src="script.js"></script>

</body>

</html>
