<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Evidence Viewer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:#050816;

    color:white;

    min-height:100vh;
}

/* HEADER */

.header{

    background:#081024;

    padding:25px 40px;

    border-bottom:2px solid #14f1d9;

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.logo{

    font-size:38px;

    font-weight:bold;

    color:#14f1d9;
}

.header-buttons{

    display:flex;

    gap:15px;
}

.header button{

    padding:12px 20px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;
}

.dashboard-btn{

    background:#14f1d9;

    color:black;
}

.logout-btn{

    background:#ff4d6d;

    color:white;
}

/* MAIN */

.main{

    padding:40px;
}

.title{

    font-size:48px;

    color:#14f1d9;

    margin-bottom:35px;
}

/* BLOCKS */

#evidenceContainer{

    display:flex;

    flex-direction:column;

    gap:25px;
}

.block{

    background:#101937;

    border:1px solid #14f1d94f;

    border-left:6px solid #14f1d9;

    border-radius:18px;

    padding:30px;

    transition:0.3s;
}

.block:hover{

    transform:translateY(-3px);

    box-shadow:0 0 18px #14f1d940;
}

.block h3{

    color:#14f1d9;

    margin-bottom:18px;

    font-size:28px;
}

.block p{

    margin-bottom:12px;

    font-size:17px;

    line-height:1.6;
}

.hash{

    color:#14f1d9;

    word-break:break-all;

    background:#18244d;

    padding:12px;

    border-radius:10px;
}

/* EMPTY */

.empty{

    background:#101937;

    padding:40px;

    border-radius:18px;

    text-align:center;

    border:1px solid #14f1d94f;
}

.empty h2{

    color:#ff4d6d;

    margin-bottom:15px;
}

.empty p{

    color:#d2d7e4;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">

        FATS

    </div>

    <div class="header-buttons">

        <button class="dashboard-btn"
        onclick="location.href='dashboard.html'">

            Dashboard

        </button>

        <button class="logout-btn"
        onclick="logout()">

            Logout

        </button>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <h1 class="title">

        Authorized Evidence Records

    </h1>

    <!-- EVIDENCE CONTAINER -->

    <div id="evidenceContainer">

    </div>

</div>

<!-- SCRIPT -->

<script src="script.js"></script>

</body>

</html>
