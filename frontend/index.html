<!DOCTYPE html>
<html>
<head>
    <title>Forensic Anti-Tamper System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#020617;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .login-box{

            width:420px;
            background:#0f172a;
            padding:40px;
            border-radius:20px;
            border:1px solid #00ffe0;
            box-shadow:0 0 40px rgba(0,255,224,0.2);
            text-align:center;
        }

        .logo{

            font-size:65px;
            margin-bottom:10px;
        }

        h1{

            color:#19f5e5;
            font-size:55px;
            margin-bottom:10px;
        }

        p{

            color:#cbd5e1;
            margin-bottom:35px;
        }

        input{

            width:100%;
            padding:16px;
            margin-bottom:18px;
            border:none;
            outline:none;
            border-radius:10px;
            background:#1e293b;
            color:white;
            font-size:16px;
        }

        button{

            width:100%;
            padding:16px;
            border:none;
            border-radius:10px;
            background:#22e3d6;
            color:black;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{

            background:#0ff;
            transform:scale(1.02);
        }

        .error{

            color:#ff5e7a;
            margin-top:15px;
        }

    </style>
</head>

<body>

<div class="login-box">

    <div class="logo"></div>

    <h1>FATS</h1>

    <p>Forensic Anti-Tamper Database System</p>

    <input type="text"
           id="username"
           placeholder="Enter Username"
           autocomplete="off">

    <input type="password"
           id="password"
           placeholder="Enter Password"
           autocomplete="new-password">

    <button onclick="login()">
        Secure Login
    </button>

    <div class="error" id="error"></div>

</div>

<script>

function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const users = [

        {
            username:"chief_forensic",
            password:"CF2026",
            role:"admin"
        },

        {
            username:"officer_01",
            password:"OFC101",
            role:"employee"
        },

        {
            username:"officer_02",
            password:"OFC102",
            role:"employee"
        }
    ];

    const validUser = users.find(user =>
        user.username === username &&
        user.password === password
    );

    if(validUser){

        localStorage.setItem("loggedIn","true");

        localStorage.setItem(
            "role",
            validUser.role
        );

        localStorage.setItem(
            "username",
            validUser.username
        );

        window.location.href =
            "dashboard.html";
    }

    else{

        document.getElementById("error").innerHTML =
            "Invalid Username or Password";
    }
}

</script>

</body>
</html>
