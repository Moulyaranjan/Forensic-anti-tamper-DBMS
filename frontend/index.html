<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forensic Anti-Tamper System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,0.7),
        rgba(0,0,0,0.8)
    ),

    url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1974&auto=format&fit=crop");

    background-size:cover;

    background-position:center;

    display:flex;

    justify-content:center;

    align-items:center;

    color:white;
}

/* LOGIN BOX */

.login-box{

    width:420px;

    background:rgba(10,15,35,0.95);

    border:2px solid #14f1d9;

    border-radius:20px;

    padding:40px;

    box-shadow:0 0 25px #14f1d960;
}

.logo{

    text-align:center;

    font-size:48px;

    font-weight:bold;

    color:#14f1d9;

    margin-bottom:10px;
}

.subtitle{

    text-align:center;

    margin-bottom:35px;

    color:#cfd6e4;

    font-size:17px;
}

.input-box{

    margin-bottom:20px;
}

.input-box label{

    display:block;

    margin-bottom:8px;

    font-size:16px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#1b2750;

    color:white;

    font-size:16px;
}

.input-box input:focus{

    outline:none;

    border:1px solid #14f1d9;
}

/* BUTTON */

.login-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#14f1d9;

    color:black;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    opacity:0.9;
}

/* MESSAGE */

#msg{

    margin-top:20px;

    text-align:center;

    font-size:17px;

    font-weight:bold;
}

/* INFO */

.info{

    margin-top:30px;

    background:#111a35;

    padding:15px;

    border-radius:12px;

    border-left:4px solid #14f1d9;
}

.info h3{

    color:#14f1d9;

    margin-bottom:10px;
}

.info p{

    margin-bottom:5px;

    color:#d4d9e6;
}

</style>

</head>

<body>

<div class="login-box">

    <!-- LOGO -->

    <div class="logo">

        FATS

    </div>

    <div class="subtitle">

        Forensic Anti-Tamper Database System

    </div>

    <!-- USERNAME -->

    <div class="input-box">

        <label>Username</label>

        <input type="text"
        id="username"
        placeholder="Enter Username">

    </div>

    <!-- PASSWORD -->

    <div class="input-box">

        <label>Password</label>

        <input type="password"
        id="password"
        placeholder="Enter Password">

    </div>

    <!-- LOGIN BUTTON -->

    <button class="login-btn"
    onclick="login()">

        Login

    </button>

    <!-- MESSAGE -->

    <div id="msg"></div>

    <!-- DEMO USERS -->

   



<!-- SCRIPT -->

<script src="script.js"></script>

</body>

</html>
